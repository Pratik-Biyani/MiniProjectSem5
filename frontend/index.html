<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <style>
      /* Move chatbot up 50px and make it 20% smaller */
      *[class*="chatbase"],
      *[id*="chatbase"],
      *[style*="position: fixed"] {
        transform: translateY(-50px) scale(0.8) !important;
        transform-origin: bottom right !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>


    <!-- Chatbase Floating Chatbot -->
    <script>
      (function(){
        if(!window.chatbase||window.chatbase("getState")!=="initialized"){
          window.chatbase=(...arguments)=>{
            if(!window.chatbase.q){window.chatbase.q=[]}
            window.chatbase.q.push(arguments)
          };
          window.chatbase=new Proxy(window.chatbase,{
            get(target,prop){
              if(prop==="q"){return target.q}
              return(...args)=>target(prop,...args)
            }
          })
        }
        const onLoad=function(){
          const script=document.createElement("script");
          script.src="https://www.chatbase.co/embed.min.js";
          script.id="saVhY5uoOa75z6hRZr1nZ";  // <-- Your bot ID
          script.domain="www.chatbase.co";
          document.body.appendChild(script);
          
          // Adjust chatbot position after it loads
          setTimeout(() => {
            document.querySelectorAll("*").forEach(el => {
              if(el.style.position === "fixed" || window.getComputedStyle(el).position === "fixed") {
                if(el.style.bottom !== "" || el.style.right !== "") {
                  el.style.transform = "translateY(-50px) scale(0.8)";
                  el.style.transformOrigin = "bottom right";
                }
              }
            });
          }, 3000);
        };
        if(document.readyState==="complete"){onLoad()}
        else{window.addEventListener("load",onLoad)}
      })();
    </script>
  </body>
</html>
